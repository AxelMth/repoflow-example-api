app = "repoflow-example-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "3001"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
